# Local eval intent for VITAAgent (hosted agent, UC-01).
# Run via Foundry evaluation tools or azd from this agent folder.
#
# Prerequisites:
#   - VITAAgent deployed (azd deploy VITAAgent --no-prompt)
#   - MAF_MODEL env var set to the evaluator model deployment name

name: vita-smoke

agent:
  name: VITAAgent
  kind: hosted

dataset:
  local_uri: dataset.jsonl

evaluators:
  - relevance
  - task_adherence
  - intent_resolution
  - indirect_attack
  - name: behavioral_adherence
    local_uri: ../_shared/evaluators/behavioral_adherence.yaml

options:
  eval_model: ${MAF_MODEL}
