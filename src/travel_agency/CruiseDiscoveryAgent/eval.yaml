# Local eval intent for CruiseDiscoveryAgent (prompt agent).

name: cruise-discovery-smoke

agent:
  name: CruiseDiscoveryAgent
  kind: prompt

dataset:
  local_uri: dataset.jsonl

evaluators:
  - relevance
  - task_adherence
  - intent_resolution
  - indirect_attack
  - name: behavioral_adherence
    local_uri: ../_shared/evaluators/behavioral_adherence.yaml

options:
  eval_model: ${MAF_MODEL}
