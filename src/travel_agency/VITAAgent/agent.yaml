# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: VITAAgent
description: |
    VITA (Voice-Enabled On-Road Training Assistant) delivers hands-free,
    conversational training to WanderWheels on-road staff. It guides learners
    through role- and country-specific modules, runs practice scenarios, rates
    performance against a rubric, and adapts the pace to the learner's progress.
metadata:
    tags:
        - WanderWheels
        - On-Road Training
        - Voice
        - VITA
        - Responses Protocol
rai_config:
    rai_policy_name: /subscriptions/5e5ef20b-2ca7-40c1-b4a1-58750a211fe8/resourceGroups/rg-ccvaa2-imlai/providers/Microsoft.CognitiveServices/accounts/aiServices-ccvaa2-imlai/raiPolicies/PIIRedactionGuardrail
protocols:
    - protocol: responses
      version: 2.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    # GPT-4o deployment used for VITA conversations (realtime capable).
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    # Azure AI Search for on-road SOP grounding (index: vita-onroad-sop).
    - name: AZURE_SEARCH_ENDPOINT
      value: ${AZURE_SEARCH_ENDPOINT}
    # Cosmos DB endpoint for learner progress persistence (container: vita-progress).
    - name: COSMOS_ENDPOINT
      value: ${COSMOS_ENDPOINT}
    # Optional: App Insights connection string for latency + score telemetry.
    - name: APPLICATIONINSIGHTS_CONNECTION_STRING
      value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
