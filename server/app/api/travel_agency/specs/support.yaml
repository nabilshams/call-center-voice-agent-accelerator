openapi: 3.0.3
info:
  title: Wanderlux - Support API
  version: 1.0.0
  description: >-
    Shared hand-off tools: escalate a conversation to a human consultant, and
    route a request by intent.


    DEMO surface only: these are stubs that return a generated reference but
    perform no real routing.
servers:
  - url: https://ca-ccvaa2-imlai.lemonbay-ee18bfbe.eastus2.azurecontainerapps.io/api/travel-agency/support
    description: Deployed Azure Container App
  - url: http://localhost:8000/api/travel-agency/support
    description: Local development
paths:
  /escalate:
    post:
      operationId: escalate_to_human
      summary: Escalate to a human consultant
      description: Escalate the current conversation to a human consultant (e.g. for serious complaints or complex requests). Returns an escalation reference. DEMO stub.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EscalateRequest" }
      responses:
        "201":
          description: Escalated
          content:
            application/json:
              schema:
                type: object
                properties:
                  escalated: { type: boolean }
                  escalation_reference: { type: string, example: ESC-A1B2C3D4 }
  /route:
    post:
      operationId: route_request
      summary: Route a request by intent
      description: >-
        Route a request to a specialist domain by intent. Recognised intents:
        FLIGHT_BOOKING, HOLIDAY_PACKAGE, CRUISE, TOUR, INSPIRATION, DEAL_ALERT,
        POST_BOOKING, CONSULTANT, GENERAL. DEMO stub.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RouteRequest" }
      responses:
        "200":
          description: Routed
          content:
            application/json:
              schema:
                type: object
                properties:
                  routed: { type: boolean }
                  intent: { type: string }
                  recognised: { type: boolean }
components:
  schemas:
    EscalateRequest:
      type: object
      properties:
        session_id: { type: string }
        reason: { type: string, example: "Customer dissatisfied with previous booking" }
        urgency: { type: string, enum: [low, normal, high], example: high }
    RouteRequest:
      type: object
      required: [intent]
      properties:
        intent:
          type: string
          enum: [FLIGHT_BOOKING, HOLIDAY_PACKAGE, CRUISE, TOUR, INSPIRATION, DEAL_ALERT, POST_BOOKING, CONSULTANT, GENERAL]
          example: CRUISE
        session_id: { type: string }
        context: { type: object }
